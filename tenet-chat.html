<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TENET Team Chat</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #b2c7d9;
    --chat-bg: #b2c7d9;
    --header-bg: #4a4a4a;
    --input-bg: #ffffff;
    --my-bubble: #ffeb33;
    --other-bubble: #ffffff;
    --text: #333333;
    --time-text: #999999;
    --date-bg: rgba(0,0,0,0.15);
    --date-text: #ffffff;
  }

  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
  }

  /* === Login Screen === */
  .login-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    padding: 20px;
    background: linear-gradient(135deg, #3a3a3a 0%, #1a1a1a 100%);
    color: #fff;
  }

  .login-screen h1 {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 8px;
    letter-spacing: 4px;
  }

  .login-screen p {
    font-size: 14px;
    color: #aaa;
    margin-bottom: 36px;
  }

  .member-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    width: 100%;
    max-width: 300px;
  }

  .member-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 20px 10px;
    border: none;
    border-radius: 16px;
    background: rgba(255,255,255,0.08);
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .member-btn:hover { background: rgba(255,255,255,0.15); transform: translateY(-2px); }
  .member-btn:active { transform: translateY(0); }

  .member-avatar {
    width: 48px;
    height: 48px;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 700;
    color: #fff;
  }

  .member-role {
    font-size: 11px;
    color: #888;
    font-weight: 400;
  }

  /* === Chat Screen === */
  .chat-screen {
    display: none;
    flex-direction: column;
    height: 100%;
  }

  .chat-screen.active {
    display: flex;
  }

  /* Header */
  .chat-header {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    background: var(--header-bg);
    color: #fff;
    min-height: 56px;
    flex-shrink: 0;
  }

  .chat-header .title {
    flex: 1;
    font-size: 17px;
    font-weight: 600;
    text-align: center;
  }

  .chat-header .member-count {
    font-size: 12px;
    color: #aaa;
    margin-left: 6px;
  }

  .chat-header .logout-btn {
    background: none;
    border: none;
    color: #aaa;
    font-size: 13px;
    cursor: pointer;
    padding: 4px 8px;
  }

  .chat-header .logout-btn:hover { color: #fff; }

  /* Messages */
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    background: var(--chat-bg);
    -webkit-overflow-scrolling: touch;
  }

  /* Date separator */
  .date-separator {
    text-align: center;
    margin: 16px 0 12px;
  }

  .date-separator span {
    display: inline-block;
    padding: 4px 12px;
    background: var(--date-bg);
    border-radius: 12px;
    font-size: 12px;
    color: var(--date-text);
  }

  /* Message row */
  .msg-row {
    display: flex;
    align-items: flex-end;
    margin-bottom: 6px;
  }

  .msg-row.mine {
    flex-direction: row-reverse;
  }

  .msg-row.continued { margin-top: -2px; }

  /* Avatar */
  .msg-avatar {
    width: 36px;
    height: 36px;
    border-radius: 12px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    color: #fff;
    margin-right: 8px;
    align-self: flex-start;
  }

  .msg-row.mine .msg-avatar { display: none; }
  .msg-row.continued .msg-avatar { visibility: hidden; }

  .msg-body { max-width: 70%; }

  .msg-sender {
    font-size: 12px;
    font-weight: 600;
    color: #555;
    margin-bottom: 3px;
    margin-left: 2px;
  }

  .msg-row.mine .msg-sender { display: none; }
  .msg-row.continued .msg-sender { display: none; }

  .msg-content-wrap {
    display: flex;
    align-items: flex-end;
    gap: 4px;
  }

  .msg-row.mine .msg-content-wrap {
    flex-direction: row-reverse;
  }

  .msg-bubble {
    padding: 8px 12px;
    border-radius: 14px;
    font-size: 15px;
    line-height: 1.45;
    word-break: break-word;
    white-space: pre-wrap;
  }

  .msg-row:not(.mine) .msg-bubble {
    background: var(--other-bubble);
    border-top-left-radius: 4px;
  }

  .msg-row.mine .msg-bubble {
    background: var(--my-bubble);
    border-top-right-radius: 4px;
  }

  .msg-time {
    font-size: 10px;
    color: var(--time-text);
    white-space: nowrap;
    flex-shrink: 0;
    margin-bottom: 2px;
  }

  /* Input area */
  .chat-input-area {
    display: flex;
    align-items: flex-end;
    padding: 8px 12px;
    background: var(--input-bg);
    border-top: 1px solid #ddd;
    gap: 8px;
    flex-shrink: 0;
  }

  .chat-input-area textarea {
    flex: 1;
    border: 1px solid #ddd;
    border-radius: 20px;
    padding: 10px 16px;
    font-size: 15px;
    font-family: inherit;
    resize: none;
    max-height: 100px;
    outline: none;
    line-height: 1.4;
    background: #f7f7f7;
  }

  .chat-input-area textarea:focus {
    border-color: #aaa;
    background: #fff;
  }

  .send-btn {
    width: 40px;
    height: 40px;
    border: none;
    border-radius: 50%;
    background: #ffeb33;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s;
  }

  .send-btn:hover { background: #ffe000; }
  .send-btn:disabled { background: #eee; cursor: default; }

  .send-btn svg {
    width: 20px;
    height: 20px;
    fill: #333;
  }

  /* Loading */
  .loading-indicator {
    text-align: center;
    padding: 40px;
    color: #888;
    font-size: 14px;
  }

  /* Scrollbar */
  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 2px; }

  /* Mobile */
  @media (max-width: 480px) {
    .msg-body { max-width: 80%; }
    .msg-bubble { font-size: 14px; }
  }

  /* Iframe friendly */
  body { min-height: 400px; }
</style>
</head>
<body>

<!-- Login Screen -->
<div class="login-screen" id="loginScreen">
  <h1>TENET</h1>
  <p>Entertainment Team Chat</p>
  <div class="member-grid">
    <button class="member-btn" onclick="selectMember('영민')">
      <div class="member-avatar" style="background:#5b7cfa;">영</div>
      <span>영민</span>
      <span class="member-role">CEO</span>
    </button>
    <button class="member-btn" onclick="selectMember('주호')">
      <div class="member-avatar" style="background:#e8573a;">주</div>
      <span>주호</span>
      <span class="member-role">CEO</span>
    </button>
    <button class="member-btn" onclick="selectMember('혜림')">
      <div class="member-avatar" style="background:#9b59b6;">혜</div>
      <span>혜림</span>
      <span class="member-role">COO</span>
    </button>
    <button class="member-btn" onclick="selectMember('요한')">
      <div class="member-avatar" style="background:#27ae60;">요</div>
      <span>요한</span>
      <span class="member-role">Engineer</span>
    </button>
  </div>
</div>

<!-- Chat Screen -->
<div class="chat-screen" id="chatScreen">
  <div class="chat-header">
    <button class="logout-btn" onclick="logout()">변경</button>
    <div class="title">TENET 팀 채팅<span class="member-count">4</span></div>
    <button class="logout-btn" id="refreshBtn" onclick="fetchMessages()">새로고침</button>
  </div>
  <div class="chat-messages" id="chatMessages">
    <div class="loading-indicator">메시지를 불러오는 중...</div>
  </div>
  <div class="chat-input-area">
    <textarea id="messageInput" rows="1" placeholder="메시지를 입력하세요" onkeydown="handleKeydown(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" onclick="sendMessage()" id="sendBtn">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbwBuPtUJt0AD-ISNsO2Irr51xIkbZwsOtWETXx3KU384mY3_58brPXM22J5WKNNA5Yf/exec';

const MEMBERS = {
  '영민': { color: '#5b7cfa', initial: '영', role: 'CEO' },
  '주호': { color: '#e8573a', initial: '주', role: 'CEO' },
  '혜림': { color: '#9b59b6', initial: '혜', role: 'COO' },
  '요한': { color: '#27ae60', initial: '요', role: 'Engineer' }
};

let currentUser = null;
let messages = [];
let pollTimer = null;
let lastMessageCount = 0;
let isAtBottom = true;

// ===== Init =====
function init() {
  const saved = localStorage.getItem('tenet-chat-user');
  if (saved && MEMBERS[saved]) {
    currentUser = saved;
    showChatScreen();
  }
}

function selectMember(name) {
  currentUser = name;
  localStorage.setItem('tenet-chat-user', name);
  showChatScreen();
}

function logout() {
  currentUser = null;
  localStorage.removeItem('tenet-chat-user');
  clearInterval(pollTimer);
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('chatScreen').classList.remove('active');
}

function showChatScreen() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('chatScreen').classList.add('active');
  fetchMessages();
  startPolling();
  setTimeout(() => document.getElementById('messageInput').focus(), 300);
}

// ===== Polling =====
function startPolling() {
  clearInterval(pollTimer);
  pollTimer = setInterval(fetchMessages, 5000);
}

// ===== Fetch Messages =====
async function fetchMessages() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    if (data.error) {
      console.error('API Error:', data.error);
      return;
    }

    if (data.messages) {
      const container = document.getElementById('chatMessages');
      // Check scroll position before update
      isAtBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 60;

      messages = data.messages;
      renderMessages();
    }
  } catch (err) {
    console.error('Fetch error:', err);
  }
}

// ===== Send Message =====
async function sendMessage() {
  const input = document.getElementById('messageInput');
  const text = input.value.trim();

  if (!text || !currentUser) return;

  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  input.value = '';
  autoResize(input);

  // Optimistic update
  const now = new Date().toISOString();
  messages.push({ timestamp: now, sender: currentUser, message: text });
  renderMessages();
  scrollToBottom();

  try {
    await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ sender: currentUser, message: text }),
      redirect: 'follow'
    });
    // Refresh to get server timestamp
    await fetchMessages();
  } catch (err) {
    console.error('Send error:', err);
  }

  btn.disabled = false;
  input.focus();
}

// ===== Render =====
function renderMessages() {
  const container = document.getElementById('chatMessages');
  let html = '';
  let lastDate = '';
  let lastSender = '';

  for (let i = 0; i < messages.length; i++) {
    const msg = messages[i];
    const dt = new Date(msg.timestamp);
    const dateStr = formatDate(dt);
    const timeStr = formatTime(dt);
    const isMine = msg.sender === currentUser;
    const member = MEMBERS[msg.sender] || { color: '#999', initial: '?', role: '' };

    // Date separator
    if (dateStr !== lastDate) {
      html += `<div class="date-separator"><span>${dateStr}</span></div>`;
      lastSender = '';
      lastDate = dateStr;
    }

    const continued = (msg.sender === lastSender);
    const rowClass = `msg-row${isMine ? ' mine' : ''}${continued ? ' continued' : ''}`;

    html += `<div class="${rowClass}">`;

    // Avatar (other only)
    if (!isMine) {
      html += `<div class="msg-avatar" style="background:${member.color}">${member.initial}</div>`;
    }

    html += `<div class="msg-body">`;

    // Sender name
    if (!isMine && !continued) {
      html += `<div class="msg-sender">${escapeHtml(msg.sender)}</div>`;
    }

    html += `<div class="msg-content-wrap">`;
    html += `<div class="msg-bubble">${escapeHtml(msg.message)}</div>`;
    html += `<div class="msg-time">${timeStr}</div>`;
    html += `</div></div></div>`;

    lastSender = msg.sender;
  }

  container.innerHTML = html || '<div class="loading-indicator">아직 메시지가 없습니다. 첫 메시지를 보내보세요!</div>';

  if (isAtBottom || messages.length !== lastMessageCount) {
    scrollToBottom();
  }
  lastMessageCount = messages.length;
}

function scrollToBottom() {
  const container = document.getElementById('chatMessages');
  requestAnimationFrame(() => {
    container.scrollTop = container.scrollHeight;
  });
}

// ===== Input Handling =====
function handleKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

// ===== Helpers =====
function formatDate(dt) {
  const y = dt.getFullYear();
  const m = dt.getMonth() + 1;
  const d = dt.getDate();
  const days = ['일', '월', '화', '수', '목', '금', '토'];
  const day = days[dt.getDay()];
  return `${y}년 ${m}월 ${d}일 ${day}요일`;
}

function formatTime(dt) {
  let h = dt.getHours();
  const m = String(dt.getMinutes()).padStart(2, '0');
  const ampm = h < 12 ? '오전' : '오후';
  if (h === 0) h = 12;
  else if (h > 12) h -= 12;
  return `${ampm} ${h}:${m}`;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// Start
init();
</script>
</body>
</html>
